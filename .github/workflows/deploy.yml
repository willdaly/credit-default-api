# Continuous Deployment: after CI passes on main, push the repository to the
# Hugging Face Space, which rebuilds the Docker image and redeploys the API.
# Pattern follows the Hugging Face Spaces GitHub Actions documentation:
# https://huggingface.co/docs/hub/en/spaces-github-actions
#
# Requires a repository secret named HF_TOKEN (a Hugging Face access token
# with write permission). Set HF_USERNAME and SPACE_NAME below.
name: Deploy to Hugging Face Space

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  HF_USERNAME: willdaly
  SPACE_NAME: credit-default-api

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${SPACE_NAME} \
            main
